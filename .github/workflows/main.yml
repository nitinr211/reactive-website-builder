name: Push Docker Image to Artifact Registry

on:
  push:
    branches:
      - main

jobs:
  push-to-artifact-registry:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Authenticate with Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}  # Uses GitHub Secret, NOT .env file

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker us-central1-docker.pkg.dev

    - name: Build and Push Docker Image
      run: |
       
        docker build -t us-central1-docker.pkg.dev/chrome-setup-445605-f8/my-repo/architect-app:latest .
        docker push us-central1-docker.pkg.dev/chrome-setup-445605-f8/my-repo/architect-app:latest

